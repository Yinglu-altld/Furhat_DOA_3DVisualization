<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DOA 3D Visualization</title>
    <style>
      :root {
        --text: #e6edf3;
        --panel-bg: rgba(8, 12, 18, 0.82);
        --panel-border: rgba(148, 163, 184, 0.35);
        --ok: #22c55e;
        --warn: #f59e0b;
        --bad: #ef4444;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: #020617;
        color: var(--text);
      }

      #status-panel {
        position: fixed;
        top: 14px;
        left: 14px;
        z-index: 10;
        width: min(420px, calc(100vw - 28px));
        background: var(--panel-bg);
        border: 1px solid var(--panel-border);
        border-radius: 10px;
        padding: 12px;
        backdrop-filter: blur(6px);
      }

      .row + .row {
        margin-top: 10px;
      }

      .label {
        font-size: 12px;
        opacity: 0.8;
        margin-bottom: 4px;
      }

      .value {
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
        font-size: 13px;
      }

      #status[data-state="connecting"] {
        color: var(--warn);
      }

      #status[data-state="open"] {
        color: var(--ok);
      }

      #status[data-state="closed"],
      #status[data-state="error"] {
        color: var(--bad);
      }

      #latest {
        margin: 0;
        padding: 10px;
        border-radius: 8px;
        background: rgba(15, 23, 42, 0.8);
        border: 1px solid rgba(148, 163, 184, 0.25);
        max-height: 110px;
        overflow: auto;
      }
    </style>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.166.1/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.166.1/examples/jsm/"
        }
      }
    </script>
  </head>
  <body>
    <aside id="status-panel">
      <div class="row">
        <div class="label">WebSocket</div>
        <div id="endpoint" class="value">ws://localhost:9000</div>
      </div>
      <div class="row">
        <div class="label">Connection Status</div>
        <div id="status" class="value" data-state="connecting">Connecting...</div>
      </div>
      <div class="row">
        <div class="label">Latest DOA Data</div>
        <pre id="latest">Waiting for messages...</pre>
      </div>
    </aside>

    <script type="module" src="./faces.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
