<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Furhat DOA Orb Visualizer</title>
    <style>
      :root {
        --bg: #0a101f;
        --bg-soft: #101a2f;
        --panel: #f6f7fb;
        --panel-muted: #e9ecf3;
        --panel-border: #d3d9e6;
        --text: #0f172a;
        --subtle: #5b6375;
        --accent: #ffc82e;
        --ok: #1ea672;
        --warn: #d9860f;
        --bad: #cc3f44;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        font-family: "Avenir Next", "Segoe UI", Helvetica, Arial, sans-serif;
        background: radial-gradient(circle at 18% 12%, #172543 0%, var(--bg) 42%, #070b15 100%);
        color: var(--text);
      }

      .app-shell {
        display: grid;
        grid-template-columns: minmax(320px, 380px) 1fr;
        gap: 14px;
        width: 100%;
        height: 100%;
        padding: 14px;
      }

      #status-panel {
        background: linear-gradient(180deg, rgba(246, 247, 251, 0.98) 0%, rgba(236, 240, 248, 0.98) 100%);
        border: 1px solid var(--panel-border);
        border-radius: 20px;
        padding: 16px;
        overflow: auto;
        box-shadow: 0 22px 48px rgba(5, 10, 24, 0.34);
      }

      .brand-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding-bottom: 12px;
        border-bottom: 1px solid var(--panel-border);
        margin-bottom: 12px;
      }

      .brand-mark {
        width: min(210px, 74%);
        height: auto;
        display: block;
      }

      .brand-chip {
        border: 1px solid #e0c25a;
        color: #6f590b;
        background: #fff9dd;
        border-radius: 999px;
        font-size: 11px;
        font-weight: 600;
        padding: 6px 10px;
        white-space: nowrap;
      }

      .row + .row {
        margin-top: 11px;
      }

      .label {
        font-size: 12px;
        color: var(--subtle);
        margin-bottom: 4px;
      }

      .value {
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
        font-size: 13px;
        color: #172038;
      }

      #status[data-state="connecting"] {
        color: var(--warn);
      }

      #status[data-state="open"] {
        color: var(--ok);
      }

      #status[data-state="closed"],
      #status[data-state="error"] {
        color: var(--bad);
      }

      #latest {
        margin: 0;
        padding: 10px;
        border-radius: 10px;
        border: 1px solid var(--panel-border);
        background: #f9fbff;
        max-height: 108px;
        overflow: auto;
        color: #0f172a;
      }

      .mode-switch {
        display: flex;
        gap: 8px;
      }

      .mode-btn {
        flex: 1;
        font-size: 12px;
        font-weight: 600;
        border: 1px solid #cad2e2;
        color: #25314a;
        background: #ffffff;
        border-radius: 9px;
        padding: 7px 8px;
        cursor: pointer;
        transition: 160ms ease;
      }

      .mode-btn:hover {
        border-color: #9fb0d0;
      }

      .mode-btn[data-active="true"] {
        color: #1c2436;
        border-color: #9daee0;
        background: linear-gradient(180deg, #edf2ff 0%, #dee8ff 100%);
        box-shadow: inset 0 0 0 1px rgba(157, 174, 224, 0.5);
      }

      .controls {
        display: grid;
        gap: 9px;
        padding: 10px;
        border-radius: 12px;
        border: 1px solid #d7deeb;
        background: #fdfdff;
      }

      .hidden {
        display: none;
      }

      .control-row {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .control-row label {
        min-width: 88px;
        font-size: 12px;
        color: #47516a;
      }

      .control-row input[type="range"] {
        flex: 1;
        accent-color: #4d7eff;
      }

      .control-row input[type="color"] {
        width: 44px;
        height: 26px;
        padding: 0;
        border: 1px solid #c6cfde;
        border-radius: 6px;
        background: transparent;
      }

      .mini-value {
        min-width: 42px;
        text-align: right;
        font-size: 12px;
        color: #3b4763;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
      }

      .button-row {
        display: flex;
        justify-content: flex-end;
      }

      .reset-btn {
        border: 1px solid #cad2e2;
        background: #fff;
        color: #2c3956;
        border-radius: 8px;
        font-size: 12px;
        padding: 5px 9px;
        cursor: pointer;
      }

      .reset-btn:hover {
        background: #f4f7ff;
      }

      .stage-shell {
        position: relative;
        overflow: hidden;
        border-radius: 22px;
        border: 1px solid rgba(115, 137, 183, 0.45);
        background: linear-gradient(160deg, #111b33 0%, #0b1429 55%, #070f21 100%);
        box-shadow: inset 0 0 0 1px rgba(160, 180, 220, 0.08), 0 22px 48px rgba(4, 8, 20, 0.52);
      }

      .stage-shell::before {
        content: "";
        position: absolute;
        width: 420px;
        height: 420px;
        top: -140px;
        right: -120px;
        background: radial-gradient(circle, rgba(121, 166, 255, 0.28) 0%, rgba(121, 166, 255, 0) 68%);
        pointer-events: none;
        animation: drift 12s ease-in-out infinite alternate;
      }

      .stage-shell::after {
        content: "";
        position: absolute;
        width: 460px;
        height: 460px;
        left: -180px;
        bottom: -210px;
        background: radial-gradient(circle, rgba(90, 226, 214, 0.2) 0%, rgba(90, 226, 214, 0) 72%);
        pointer-events: none;
        animation: drift 14s ease-in-out infinite alternate-reverse;
      }

      @keyframes drift {
        from {
          transform: translate3d(0, 0, 0);
        }
        to {
          transform: translate3d(20px, 12px, 0);
        }
      }

      .stage-header {
        position: absolute;
        top: 12px;
        left: 12px;
        z-index: 5;
        display: flex;
        gap: 8px;
      }

      .stage-pill {
        border: 1px solid rgba(255, 255, 255, 0.22);
        background: rgba(13, 20, 39, 0.55);
        color: #dbe8ff;
        backdrop-filter: blur(8px);
        border-radius: 999px;
        padding: 6px 10px;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.2px;
      }

      #viz-root {
        position: absolute;
        inset: 0;
        z-index: 1;
      }

      #viz-root canvas {
        display: block;
      }

      @media (max-width: 1100px) {
        .app-shell {
          grid-template-columns: 1fr;
          grid-template-rows: minmax(280px, auto) 1fr;
        }

        #status-panel {
          max-height: 43vh;
        }
      }
    </style>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.166.1/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.166.1/examples/jsm/"
        }
      }
    </script>
  </head>
  <body>
    <div class="app-shell">
      <aside id="status-panel">
        <div class="brand-row">
          <img class="brand-mark" src="./public/furhat-logo.svg" alt="Furhat Robotics" />
          <span class="brand-chip">DOA Monitor</span>
        </div>

        <div class="row">
          <div class="label">WebSocket</div>
          <div id="endpoint" class="value">ws://localhost:9000</div>
        </div>

        <div class="row">
          <div class="label">Connection Status</div>
          <div id="status" class="value" data-state="connecting">Connecting...</div>
        </div>

        <div class="row">
          <div class="label">Latest DOA Data</div>
          <pre id="latest">Waiting for messages...</pre>
        </div>

        <div class="row">
          <div class="label">Orb Mode</div>
          <div class="mode-switch">
            <button
              id="mode-faces"
              class="mode-btn"
              type="button"
              onclick="window.switchOrbMode && window.switchOrbMode('faces')"
            >
              Faces
            </button>
            <button
              id="mode-wireframe"
              class="mode-btn"
              type="button"
              onclick="window.switchOrbMode && window.switchOrbMode('wireframe')"
            >
              Wireframe
            </button>
            <button
              id="mode-arrow"
              class="mode-btn"
              type="button"
              onclick="window.switchOrbMode && window.switchOrbMode('arrow')"
            >
              Arrow
            </button>
            <button
              id="mode-furhat"
              class="mode-btn"
              type="button"
              onclick="window.switchOrbMode && window.switchOrbMode('furhat')"
            >
              Furhat
            </button>
          </div>
        </div>

        <div class="row" id="style-controls-row">
          <div class="label">Style Controls</div>

          <div id="controls-faces" class="controls hidden">
            <div class="control-row">
              <label for="faces-fill-color">Fill Color</label>
              <input id="faces-fill-color" type="color" value="#0000ff" />
            </div>

            <div class="control-row">
              <label for="faces-fill-opacity">Fill Opacity</label>
              <input id="faces-fill-opacity" type="range" min="0" max="1" step="0.01" value="0.30" />
              <span id="faces-fill-opacity-value" class="mini-value">0.30</span>
            </div>

            <div class="control-row">
              <label for="faces-explode">Explode</label>
              <input id="faces-explode" type="range" min="0" max="0.3" step="0.01" value="0.10" />
              <span id="faces-explode-value" class="mini-value">0.10</span>
            </div>

            <div class="button-row">
              <button id="faces-reset-style" class="reset-btn" type="button">Reset</button>
            </div>
          </div>

          <div id="controls-wireframe" class="controls hidden">
            <div class="control-row">
              <label for="wire-fill-color">Fill Color</label>
              <input id="wire-fill-color" type="color" value="#5e07c3" />
            </div>

            <div class="control-row">
              <label for="wire-fill-opacity">Fill Opacity</label>
              <input id="wire-fill-opacity" type="range" min="0" max="1" step="0.01" value="0.20" />
              <span id="wire-fill-opacity-value" class="mini-value">0.20</span>
            </div>

            <div class="control-row">
              <label for="wire-line-color">Wire Color</label>
              <input id="wire-line-color" type="color" value="#76f3f7" />
            </div>

            <div class="control-row">
              <label for="wire-line-opacity">Wire Opacity</label>
              <input id="wire-line-opacity" type="range" min="0" max="1" step="0.01" value="0.50" />
              <span id="wire-line-opacity-value" class="mini-value">0.50</span>
            </div>

            <div class="button-row">
              <button id="wire-reset-style" class="reset-btn" type="button">Reset</button>
            </div>
          </div>

          <div id="controls-arrow" class="controls hidden">
            <div class="control-row">
              <label for="arrow-color">Arrow Color</label>
              <input id="arrow-color" type="color" value="#4de7c8" />
            </div>

            <div class="control-row">
              <label for="arrow-length-scale">Length Scale</label>
              <input id="arrow-length-scale" type="range" min="0.50" max="2.50" step="0.01" value="1.00" />
              <span id="arrow-length-scale-value" class="mini-value">1.00</span>
            </div>

            <div class="button-row">
              <button id="arrow-reset-style" class="reset-btn" type="button">Reset</button>
            </div>
          </div>

          <div id="controls-furhat" class="controls hidden">
            <div class="control-row">
              <label for="furhat-accent-color">Accent Color</label>
              <input id="furhat-accent-color" type="color" value="#22d6ff" />
            </div>

            <div class="control-row">
              <label for="furhat-turn-gain">Turn Gain</label>
              <input id="furhat-turn-gain" type="range" min="0.20" max="2.50" step="0.01" value="1.00" />
              <span id="furhat-turn-gain-value" class="mini-value">1.00</span>
            </div>

            <div class="control-row">
              <label for="furhat-bob-amount">Bob Amount</label>
              <input id="furhat-bob-amount" type="range" min="0.00" max="0.40" step="0.01" value="0.16" />
              <span id="furhat-bob-amount-value" class="mini-value">0.16</span>
            </div>

            <div class="button-row">
              <button id="furhat-reset-style" class="reset-btn" type="button">Reset</button>
            </div>
          </div>
        </div>
      </aside>

      <section class="stage-shell">
        <div class="stage-header">
          <span class="stage-pill">Furhat DOA Visualizer</span>
          <span class="stage-pill" id="mode-pill">Mode</span>
        </div>
        <div id="viz-root"></div>
      </section>
    </div>

    <script>
      (function () {
        const url = new URL(window.location.href);
        const allowedModes = ["faces", "wireframe", "arrow", "furhat"];
        const requestedMode = url.searchParams.get("orbStyle");
        const mode = allowedModes.includes(requestedMode) ? requestedMode : "faces";
        window.__orbStyle = mode;

        const modePill = document.getElementById("mode-pill");
        if (modePill) {
          if (mode === "wireframe") modePill.textContent = "Wireframe";
          else if (mode === "arrow") modePill.textContent = "Arrow";
          else if (mode === "furhat") modePill.textContent = "Furhat";
          else modePill.textContent = "Faces";
        }

        const rendererModule = document.createElement("script");
        rendererModule.type = "module";
        rendererModule.src = `./${mode}.js`;
        document.body.appendChild(rendererModule);
      })();
    </script>
    <script src="./app.js"></script>
  </body>
</html>
