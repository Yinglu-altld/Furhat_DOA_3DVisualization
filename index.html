<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DOA 3D Visualization</title>
    <style>
      :root {
        --text: #e6edf3;
        --panel-bg: rgba(8, 12, 18, 0.82);
        --panel-border: rgba(148, 163, 184, 0.35);
        --ok: #22c55e;
        --warn: #f59e0b;
        --bad: #ef4444;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: #020617;
        color: var(--text);
      }

      canvas {
        position: fixed;
        inset: 0;
        z-index: 1;
      }

      #status-panel {
        position: fixed;
        top: 14px;
        left: 14px;
        z-index: 1000;
        width: min(420px, calc(100vw - 28px));
        background: var(--panel-bg);
        border: 1px solid var(--panel-border);
        border-radius: 10px;
        padding: 12px;
        backdrop-filter: blur(6px);
        pointer-events: auto;
      }

      .row + .row {
        margin-top: 10px;
      }

      .label {
        font-size: 12px;
        opacity: 0.8;
        margin-bottom: 4px;
      }

      .value {
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
        font-size: 13px;
      }

      #status[data-state="connecting"] {
        color: var(--warn);
      }

      #status[data-state="open"] {
        color: var(--ok);
      }

      #status[data-state="closed"],
      #status[data-state="error"] {
        color: var(--bad);
      }

      #latest {
        margin: 0;
        padding: 10px;
        border-radius: 8px;
        background: rgba(15, 23, 42, 0.8);
        border: 1px solid rgba(148, 163, 184, 0.25);
        max-height: 110px;
        overflow: auto;
      }

      .mode-switch {
        display: flex;
        gap: 8px;
      }

      .mode-btn {
        flex: 1;
        font-size: 12px;
        border: 1px solid rgba(148, 163, 184, 0.45);
        background: rgba(30, 41, 59, 0.85);
        color: var(--text);
        border-radius: 6px;
        padding: 6px 8px;
        cursor: pointer;
      }

      .mode-btn[data-active="true"] {
        border-color: rgba(34, 211, 238, 0.9);
        box-shadow: inset 0 0 0 1px rgba(34, 211, 238, 0.7);
        background: rgba(8, 47, 73, 0.9);
      }

      .controls {
        display: grid;
        gap: 8px;
        padding: 10px;
        border-radius: 8px;
        background: rgba(15, 23, 42, 0.8);
        border: 1px solid rgba(148, 163, 184, 0.25);
      }

      .hidden {
        display: none;
      }

      .control-row {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .control-row label {
        font-size: 12px;
        min-width: 88px;
        opacity: 0.9;
      }

      .control-row input[type="range"] {
        flex: 1;
      }

      .control-row input[type="color"] {
        width: 44px;
        height: 26px;
        padding: 0;
        border: none;
        background: transparent;
      }

      .mini-value {
        min-width: 40px;
        text-align: right;
        font-size: 12px;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
      }

      .button-row {
        display: flex;
        justify-content: flex-end;
      }

      .reset-btn {
        font-size: 12px;
        border: 1px solid rgba(148, 163, 184, 0.45);
        background: rgba(30, 41, 59, 0.85);
        color: var(--text);
        border-radius: 6px;
        padding: 4px 8px;
        cursor: pointer;
      }

      .reset-btn:hover {
        background: rgba(51, 65, 85, 0.9);
      }
    </style>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.166.1/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.166.1/examples/jsm/"
        }
      }
    </script>
  </head>
  <body>
    <aside id="status-panel">
      <div class="row">
        <div class="label">WebSocket</div>
        <div id="endpoint" class="value">ws://localhost:9000</div>
      </div>

      <div class="row">
        <div class="label">Connection Status</div>
        <div id="status" class="value" data-state="connecting">Connecting...</div>
      </div>

      <div class="row">
        <div class="label">Latest DOA Data</div>
        <pre id="latest">Waiting for messages...</pre>
      </div>

      <div class="row">
        <div class="label">Orb Mode</div>
        <div class="mode-switch">
          <button
            id="mode-faces"
            class="mode-btn"
            type="button"
            onclick="window.switchOrbMode && window.switchOrbMode('faces')"
          >
            Faces
          </button>
          <button
            id="mode-wireframe"
            class="mode-btn"
            type="button"
            onclick="window.switchOrbMode && window.switchOrbMode('wireframe')"
          >
            Wireframe
          </button>
        </div>
      </div>

      <div class="row">
        <div class="label">Style Controls</div>

        <div id="controls-faces" class="controls hidden">
          <div class="control-row">
            <label for="faces-fill-color">Fill Color</label>
            <input id="faces-fill-color" type="color" value="#0000ff" />
          </div>

          <div class="control-row">
            <label for="faces-fill-opacity">Fill Opacity</label>
            <input id="faces-fill-opacity" type="range" min="0" max="1" step="0.01" value="0.30" />
            <span id="faces-fill-opacity-value" class="mini-value">0.30</span>
          </div>

          <div class="control-row">
            <label for="faces-explode">Explode</label>
            <input id="faces-explode" type="range" min="0" max="0.3" step="0.01" value="0.10" />
            <span id="faces-explode-value" class="mini-value">0.10</span>
          </div>

          <div class="button-row">
            <button id="faces-reset-style" class="reset-btn" type="button">Reset</button>
          </div>
        </div>

        <div id="controls-wireframe" class="controls hidden">
          <div class="control-row">
            <label for="wire-fill-color">Fill Color</label>
            <input id="wire-fill-color" type="color" value="#5e07c3" />
          </div>

          <div class="control-row">
            <label for="wire-fill-opacity">Fill Opacity</label>
            <input id="wire-fill-opacity" type="range" min="0" max="1" step="0.01" value="0.20" />
            <span id="wire-fill-opacity-value" class="mini-value">0.20</span>
          </div>

          <div class="control-row">
            <label for="wire-line-color">Wire Color</label>
            <input id="wire-line-color" type="color" value="#76f3f7" />
          </div>

          <div class="control-row">
            <label for="wire-line-opacity">Wire Opacity</label>
            <input id="wire-line-opacity" type="range" min="0" max="1" step="0.01" value="0.50" />
            <span id="wire-line-opacity-value" class="mini-value">0.50</span>
          </div>

          <div class="button-row">
            <button id="wire-reset-style" class="reset-btn" type="button">Reset</button>
          </div>
        </div>
      </div>
    </aside>

    <script>
      (function () {
        const url = new URL(window.location.href);
        const mode = url.searchParams.get("orbStyle") === "wireframe" ? "wireframe" : "faces";
        window.__orbStyle = mode;

        const rendererModule = document.createElement("script");
        rendererModule.type = "module";
        rendererModule.src = mode === "wireframe" ? "./wireframe.js" : "./faces.js";
        document.body.appendChild(rendererModule);
      })();
    </script>
    <script src="./app.js"></script>
  </body>
</html>
